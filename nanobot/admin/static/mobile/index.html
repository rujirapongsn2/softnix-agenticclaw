<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Softnix">
  <meta name="theme-color" content="#2587c8">
  <script src="/mobile/theme-init.js"></script>
  <link rel="manifest" href="/mobile/manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="/mobile/apple-touch-icon.png">
  <link rel="stylesheet" href="/mobile/mobile.css">
  <link rel="icon" type="image/png" sizes="180x180" href="/mobile/apple-touch-icon.png">
  <title>Softnix Agent</title>
</head>
<body>

  <!-- Pairing Screen -->
  <div id="screen-pairing" class="screen" style="display:none">
    <div class="pairing-shell">
      <div class="hero-orb-wrap">
        <div class="hero-orb">
          <span class="hero-orb-halo" aria-hidden="true"></span>
          <span class="hero-orb-ring hero-orb-ring--outer" aria-hidden="true"></span>
          <span class="hero-orb-ring hero-orb-ring--inner" aria-hidden="true"></span>
          <span class="hero-orb-sheen" aria-hidden="true"></span>
          <div class="hero-orb-core">
            <img src="/static/Logo_Softnix.png" alt="Softnix" class="hero-orb-logo">
          </div>
        </div>
      </div>
      <div class="hero-copy">
        <p class="eyebrow">Softnix AI</p>
        <h1>Connecting your assistant</h1>
        <p class="pairing-status" id="pairing-status">Connecting to agent…</p>
      </div>
      <div class="glass-card pairing-card">
        <div class="spinner spinner--dots" id="pairing-spinner" aria-label="Connecting" role="status">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="pairing-card-note">Securely pairing this device with your Softnix workspace.</p>
      </div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="screen-chat" class="screen" style="display:none">
    <div class="chat-shell">
      <!-- Header -->
      <header class="chat-header">
        <div class="chat-header-left">
          <button class="hamburger-btn" id="btn-disconnect" title="Menu" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
        <div class="chat-header-center">
          <div class="title-chip" id="chat-instance-id">Agentic Claw</div>
        </div>
        <div class="chat-header-right">
          <button class="user-avatar" id="btn-chats" type="button" aria-label="Chats">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="5" y="4" width="14" height="16" rx="2"/>
              <line x1="9" y1="9" x2="15" y2="9"/>
              <line x1="9" y1="13" x2="13" y2="13"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="chat-stage">
        <section id="chat-home" class="chat-home">
          <div class="hero-stack">
            <div class="hero-orb-wrap">
              <div class="hero-orb hero-orb--large">
                <span class="hero-orb-halo" aria-hidden="true"></span>
                <span class="hero-orb-ring hero-orb-ring--outer" aria-hidden="true"></span>
                <span class="hero-orb-ring hero-orb-ring--inner" aria-hidden="true"></span>
                <span class="hero-orb-sheen" aria-hidden="true"></span>
                <div class="hero-orb-core">
                  <img src="/static/Logo_Softnix.png" alt="Softnix" class="hero-orb-logo">
                </div>
              </div>
            </div>
            <div class="hero-copy hero-copy--center">
              <h1>How can I help you<br>today?</h1>
            </div>
          </div>

          <div class="quick-actions" id="quick-actions">
            <button class="quick-action" data-quick-prompt="Ask Anything">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
              Ask Anything
            </button>
            <button class="quick-action" data-quick-prompt="Summarize">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h9"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg></span>
              Summarize
            </button>
            <button class="quick-action" data-quick-prompt="Schedule Task">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
              Schedule Task
            </button>
            <button class="quick-action" data-quick-prompt="Meeting Notes">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11h6"/><path d="M9 15h4"/><path d="M5 4h14a2 2 0 0 1 2 2v12l-4-3H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg></span>
              Meeting Notes
            </button>
            <button class="quick-action" data-quick-prompt="Prioritize">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h11"/><path d="M4 12h7"/><path d="M4 18h5"/><circle cx="19" cy="6" r="2"/><circle cx="17" cy="12" r="2"/><circle cx="15" cy="18" r="2"/></svg></span>
              Prioritize
            </button>
          </div>
        </section>

        <div id="messages" class="messages"></div>
      </main>

      <!-- Compose Bar -->
      <div class="compose-dock-wrap">
        <div class="compose-bar">
          <button class="attach-btn" id="btn-attach" type="button" aria-label="Attach file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <div class="compose-main">
            <div id="compose-reply" class="compose-reply" style="display:none"></div>
            <div id="compose-attachments" class="compose-attachments" style="display:none"></div>
            <textarea id="compose-input" rows="1" placeholder="Message AI..." autocomplete="off"></textarea>
          </div>
          <button id="btn-send" class="send-btn" disabled aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
            </svg>
          </button>
        </div>
      </div>
      <input id="attachment-input" type="file" multiple hidden>
    </div>
  </div>

  <!-- Error Screen -->
  <div id="screen-error" class="screen" style="display:none">
    <div class="pairing-shell">
      <div class="hero-orb-wrap">
        <div class="hero-orb hero-orb--error">
          <span class="hero-orb-halo" aria-hidden="true"></span>
          <span class="hero-orb-ring hero-orb-ring--outer" aria-hidden="true"></span>
          <span class="hero-orb-ring hero-orb-ring--inner" aria-hidden="true"></span>
          <span class="hero-orb-sheen" aria-hidden="true"></span>
          <div class="hero-orb-core">
            <img src="/static/Logo_Softnix.png" alt="Softnix" class="hero-orb-logo">
          </div>
        </div>
      </div>
      <div class="hero-copy">
        <p class="eyebrow">Softnix AI</p>
        <h1>Connection Failed</h1>
        <p class="pairing-status" id="error-message">Something went wrong.</p>
      </div>
      <button class="action-btn" id="btn-retry">Try Again</button>
    </div>
  </div>

  <script src="/mobile/mobile.js"></script>
</body>
</html>
