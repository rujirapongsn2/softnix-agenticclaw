<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Softnix">
  <meta name="theme-color" content="#2587c8">
  <link rel="manifest" href="/mobile/manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="/mobile/apple-touch-icon.png">
  <link rel="stylesheet" href="/mobile/mobile.css">
  <link rel="icon" href="/static/Logo_Softnix.png">
  <title>Softnix Agent</title>
</head>
<body>

  <!-- Pairing Screen -->
  <div id="screen-pairing" class="screen" style="display:none">
    <div class="pairing-shell">
      <div class="hero-orb-wrap">
        <div class="hero-orb">
          <div class="hero-orb-core">
            <img src="/static/Logo_Softnix.png" alt="Softnix" class="hero-orb-logo">
          </div>
        </div>
      </div>
      <div class="hero-copy">
        <p class="eyebrow">Softnix AI</p>
        <h1>Connecting your assistant</h1>
        <p class="pairing-status" id="pairing-status">Connecting to agent…</p>
      </div>
      <div class="glass-card pairing-card">
        <div class="spinner" id="pairing-spinner"></div>
        <p class="pairing-card-note">Securely pairing this device with your Softnix workspace.</p>
      </div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="screen-chat" class="screen" style="display:none">
    <div class="chat-shell">
      <!-- Header -->
      <header class="chat-header">
        <div class="chat-header-left">
          <button class="hamburger-btn" id="btn-disconnect" title="Menu" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
        <div class="chat-header-center">
          <div class="title-chip" id="chat-instance-id">Agentic Claw</div>
        </div>
        <div class="chat-header-right">
          <button class="user-avatar" id="btn-chats" type="button" aria-label="Chats">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="5" y="4" width="14" height="16" rx="2"/>
              <line x1="9" y1="9" x2="15" y2="9"/>
              <line x1="9" y1="13" x2="13" y2="13"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="chat-stage">
        <section id="chat-home" class="chat-home">
          <div class="hero-stack">
            <div class="hero-orb-wrap">
              <div class="hero-orb hero-orb--large">
                <div class="hero-orb-core">
                  <img src="/static/Logo_Softnix.png" alt="Softnix" class="hero-orb-logo">
                </div>
              </div>
            </div>
            <div class="hero-copy hero-copy--center">
              <h1>How can I help you<br>today?</h1>
            </div>
          </div>

          <div class="quick-actions" id="quick-actions">
            <button class="quick-action" data-quick-prompt="Ask Anything">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
              Ask Anything
            </button>
            <button class="quick-action" data-quick-prompt="Create Image">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></span>
              Create Image
            </button>
            <button class="quick-action" data-quick-prompt="Code">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>
              Code
            </button>
            <button class="quick-action" data-quick-prompt="Analyze">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
              Analyze
            </button>
            <button class="quick-action" data-quick-prompt="Brainstorm">
              <span class="qa-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/><path d="M10 21h4"/></svg></span>
              Brainstorm
            </button>
          </div>
        </section>

        <div id="messages" class="messages"></div>
      </main>

      <!-- Compose Bar -->
      <div class="compose-dock-wrap">
        <div class="compose-bar">
          <button class="attach-btn" id="btn-attach" type="button" aria-label="Attach file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <div class="compose-main">
            <div id="compose-reply" class="compose-reply" style="display:none"></div>
            <div id="compose-attachments" class="compose-attachments" style="display:none"></div>
            <textarea id="compose-input" rows="1" placeholder="Message AI..." autocomplete="off"></textarea>
          </div>
          <button class="compose-side-btn" id="btn-voice" type="button" aria-label="Voice input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <button id="btn-send" class="send-btn" disabled aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
            </svg>
          </button>
        </div>
      </div>
      <input id="attachment-input" type="file" multiple hidden>
    </div>
  </div>

  <!-- Error Screen -->
  <div id="screen-error" class="screen" style="display:none">
    <div class="pairing-shell">
      <div class="hero-orb-wrap">
        <div class="hero-orb hero-orb--error">
          <div class="hero-orb-core">
            <img src="/static/Logo_Softnix.png" alt="Softnix" class="hero-orb-logo">
          </div>
        </div>
      </div>
      <div class="hero-copy">
        <p class="eyebrow">Softnix AI</p>
        <h1>Connection Failed</h1>
        <p class="pairing-status" id="error-message">Something went wrong.</p>
      </div>
      <button class="action-btn" id="btn-retry">Try Again</button>
    </div>
  </div>

  <script src="/mobile/mobile.js"></script>
</body>
</html>
